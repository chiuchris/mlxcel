name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag to upload artifacts to (e.g. v0.1.0). Empty = no upload (build-only verification run).'
        required: false
      targets:
        description: 'Which platforms to build. Only applies to workflow_dispatch; a real release event always builds everything.'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - macos
          - linux
          - linux-aarch64
          - linux-x86_64

# Default-deny top-level permissions; each job grants only what it needs.
permissions: {}

# Pinned MLX C++ commit, shared by both Linux CUDA jobs for build-cache
# validation. Must match GIT_TAG in src/lib/mlx-cpp/CMakeLists.txt and
# MLX_EXPECTED_COMMIT in src/lib/mlxcel-core/build.rs (the three-place pin
# documented in CLAUDE.md). Hoisted to workflow scope so a future bump
# touches one literal here instead of one per job.
env:
  MLX_EXPECTED_COMMIT: "a6ec7123dac814417147e21d4aeed694924ddd4d"

jobs:
  # ============================================================================
  # macOS ARM64 (Apple Silicon) build
  # ============================================================================
  build-macos:
    name: Build macOS (Apple Silicon)
    runs-on: self-hosted-macos-26-arm64 # Self-hosted Apple Silicon runner with macOS 26 SDK + Metal 4
    environment: packaging
    timeout-minutes: 90
    # Block forks from invoking this workflow against the canonical self-hosted
    # runner pool. `workflow_dispatch` can be triggered from any branch the
    # actor has push access to, so this guard is the last line of defense
    # against a forked copy of the repo dispatching a build with the
    # canonical-org runner labels.
    #
    # On a real release event we always build every target; the `targets`
    # input only filters manual workflow_dispatch runs (e.g. re-uploading a
    # single platform's asset to an existing release without churning the
    # other platforms' hashes).
    if: |
      github.repository == 'lablup/mlxcel' && (
        github.event_name == 'release' ||
        github.event.inputs.targets == 'all' ||
        github.event.inputs.targets == 'macos'
      )
    permissions:
      contents: write

    env:
      MACOSX_DEPLOYMENT_TARGET: "14.0"

    steps:
      # Self-healing release: build the *source of the target tag* while
      # running the *current* workflow definition. GitHub always executes the
      # release.yml baked into the triggering ref, so a bug in an old tag's
      # workflow (e.g. a broken notarization step) cannot be fixed by
      # re-running that tag. To recover, dispatch this workflow from main
      # (or any branch carrying the fixed release.yml) and pass the old tag
      # as release_tag: the fixed workflow runs, but the old tag's source is
      # what gets built and uploaded.
      #   - release event      -> the published release's tag
      #   - workflow_dispatch  -> the release_tag input, when provided
      #   - otherwise          -> the exact commit that triggered the run
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          # Don't leave GITHUB_TOKEN in .git/config; release jobs only fetch.
          persist-credentials: false
          ref: ${{ github.event.release.tag_name || github.event.inputs.release_tag || github.sha }}

      # Use persistent cache paths for self-hosted runner (outside workspace)
      - name: Setup persistent cache paths (self-hosted)
        run: |
          # Set persistent cargo target directory to enable incremental builds
          # on self-hosted runner (avoids recompiling from scratch every run)
          CARGO_TARGET="$HOME/.cargo-target/mlxcel"
          mkdir -p "$CARGO_TARGET"
          echo "CARGO_TARGET_DIR=$CARGO_TARGET" >> $GITHUB_ENV

          # Prune stale cargo target cache if older than 7 days
          # Prevents unbounded disk growth from accumulated build artifacts
          MARKER="$CARGO_TARGET/.last-clean"
          SHOULD_CLEAN=false
          if [ ! -f "$MARKER" ]; then
            SHOULD_CLEAN=true
          elif [ "$(find "$MARKER" -mtime +7 2>/dev/null)" ]; then
            SHOULD_CLEAN=true
          fi
          if [ "$SHOULD_CLEAN" = true ]; then
            echo "Cargo target cache older than 7 days — cleaning"
            rm -rf "$CARGO_TARGET"
            mkdir -p "$CARGO_TARGET"
            date -u +"%Y-%m-%dT%H:%M:%SZ" > "$MARKER"
          else
            AGE_DAYS=$(( ($(date +%s) - $(stat -f %m "$MARKER")) / 86400 ))
            echo "Cargo target cache age: ${AGE_DAYS}d — keeping"
          fi

      - name: Ensure build tools
        run: |
          # cmake is required by mlxcel-core and sentencepiece-sys build scripts
          if ! command -v cmake &>/dev/null; then
            echo "cmake not found, installing via Homebrew..."
            brew install cmake
          fi
          echo "cmake: $(cmake --version | head -1)"
          echo "git: $(git --version)"

      - name: Verify build environment
        run: |
          echo "=== macOS ==="
          sw_vers
          echo ""
          echo "=== Xcode SDK ==="
          xcrun --show-sdk-version
          echo ""
          echo "=== Metal version ==="
          echo "__METAL_VERSION__" | xcrun -sdk macosx metal -E -x metal -P - | tail -1
          echo ""
          echo "=== Metal compiler ==="
          xcrun -sdk macosx metal --version

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      # Lint and test deliberately do not run in this workflow.
      #
      # `clippy + test` against the macOS Apple Silicon target takes ~30+ min
      # on the shared self-hosted runner. We tried gating it at PR time
      # (ci.yml::clippy-and-test) and at release time (this job, see #21),
      # and in both cases the cost outweighed the signal — PRs and releases
      # were both being blocked on a slow shared resource for failures that
      # `make verify` / `make verify-clean` reliably catch on the developer's
      # machine in a fraction of the time.
      #
      # Quality gate lives locally now. Pre-push checklist:
      #   make verify         # fmt + clippy(metal,accelerate, -D warnings) + test(release)
      #   make verify-clean   # same, after `cargo clean` — use when clippy's
      #                       # per-crate cache may be hiding a regression
      #
      # PR-time CI (ci.yml) still runs cargo-deny and cargo-fmt on ubuntu
      # for cheap license/format drift detection.

      - name: Build release binaries
        run: cargo build --release --target aarch64-apple-darwin --locked
        env:
          RUSTFLAGS: "-C target-cpu=apple-m1"

      - name: Prepare signing certificate (rcodesign)
        env:
          APPLE_CERTIFICATE: ${{ secrets.DEV_ID_CERT_P12 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.DEV_ID_CERT_PASSWORD }}
        run: |
          set -euo pipefail

          # Use rcodesign instead of Apple's codesign to bypass macOS 26 keychain
          # session issues on self-hosted runners. rcodesign reads PEM directly —
          # no keychain, no SecurityAgent, no GUI session required.
          for var in APPLE_CERTIFICATE APPLE_CERTIFICATE_PASSWORD; do
            if [ -z "${!var:-}" ]; then
              echo "::error::Secret $var is not set in the 'packaging' environment."
              exit 1
            fi
          done

          P12_FILE="$RUNNER_TEMP/original.p12"
          PEM_PATH="$RUNNER_TEMP/signing.pem"
          OPENSSL_ERR="$RUNNER_TEMP/openssl.err"

          # Tolerate trailing whitespace/newlines from copy-paste when decoding.
          printf '%s' "$APPLE_CERTIFICATE" | tr -d '[:space:]' | base64 --decode > "$P12_FILE"

          # Extract to unencrypted PEM (cert + private key) using -legacy flag
          # for p12 files with legacy RC2-40-CBC encryption. Capture stderr so
          # a wrong password / corrupt file surfaces a useful diagnostic
          # instead of an empty PEM with no explanation.
          if ! openssl pkcs12 -in "$P12_FILE" \
              -passin "pass:$APPLE_CERTIFICATE_PASSWORD" \
              -legacy -nodes -out "$PEM_PATH" 2> "$OPENSSL_ERR"; then
            echo "::error::openssl pkcs12 failed to extract the signing certificate:"
            cat "$OPENSSL_ERR"
            rm -f "$P12_FILE" "$OPENSSL_ERR"
            exit 1
          fi
          rm -f "$P12_FILE" "$OPENSSL_ERR"
          chmod 600 "$PEM_PATH"

          if [ ! -s "$PEM_PATH" ]; then
            echo "::error::Extracted PEM is empty after openssl pkcs12 succeeded"
            exit 1
          fi

          echo "=== Certificate details ==="
          openssl x509 -in "$PEM_PATH" -noout -subject -dates 2>/dev/null || true

          echo "PEM_FILE=$PEM_PATH" >> "$GITHUB_ENV"

      - name: Install rcodesign
        run: |
          RCODESIGN_VERSION="0.29.0"
          RCODESIGN_DIR="$HOME/.rcodesign"
          RCODESIGN_BIN="$RCODESIGN_DIR/rcodesign"

          if [ -f "$RCODESIGN_BIN" ] && "$RCODESIGN_BIN" --version 2>/dev/null | grep -q "$RCODESIGN_VERSION"; then
            echo "rcodesign $RCODESIGN_VERSION already installed"
          else
            echo "Installing rcodesign $RCODESIGN_VERSION..."
            mkdir -p "$RCODESIGN_DIR"
            curl -sL "https://github.com/indygreg/apple-platform-rs/releases/download/apple-codesign%2F${RCODESIGN_VERSION}/apple-codesign-${RCODESIGN_VERSION}-aarch64-apple-darwin.tar.gz" \
              | tar xz -C "$RCODESIGN_DIR" --strip-components=1
          fi
          echo "$RCODESIGN_DIR" >> $GITHUB_PATH

      - name: Code sign macOS binaries
        run: |
          set -euo pipefail
          BIN_DIR="$CARGO_TARGET_DIR/aarch64-apple-darwin/release"
          for BIN in mlxcel mlxcel-server; do
            echo "Signing $BIN..."
            rcodesign sign \
              --pem-file "$PEM_FILE" \
              --code-signature-flags runtime \
              "$BIN_DIR/$BIN"
          done

          echo "=== Verifying signatures ==="
          for BIN in mlxcel mlxcel-server; do
            rcodesign verify "$BIN_DIR/$BIN"
          done

      # macOS notarization via App Store Connect API key.
      # We submit a temporary zip wrapping the already-codesigned binaries
      # (notary submission only accepts .zip/.dmg/.pkg). Stapling is intentionally
      # skipped: bare Mach-O executables don't support stapling — only .app/
      # .dmg/.pkg containers do. Gatekeeper verifies the notarization ticket
      # online at first launch instead.
      - name: Notarize macOS binaries
        env:
          AC_API_KEY_ID: ${{ secrets.AC_API_KEY_ID }}
          AC_API_ISSUER_ID: ${{ secrets.AC_API_ISSUER_ID }}
          AC_API_PRIVATE_KEY_P8: ${{ secrets.AC_API_PRIVATE_KEY_P8 }}
        run: |
          set -euo pipefail

          BIN_DIR="$CARGO_TARGET_DIR/aarch64-apple-darwin/release"
          KEY_FILE="$RUNNER_TEMP/AuthKey.p8"
          AC_KEY_JSON="$RUNNER_TEMP/ac-key.json"
          NOTARIZE_DIR="$RUNNER_TEMP/notarize-dir"
          NOTARIZE_ZIP="$RUNNER_TEMP/notarize.zip"

          # Always wipe API-key material, even on early failure. The PEM
          # signing key is wiped by the dedicated cleanup step at job end.
          cleanup() {
            rm -f "$KEY_FILE" "$AC_KEY_JSON" "$NOTARIZE_ZIP"
            rm -rf "$NOTARIZE_DIR"
          }
          trap cleanup EXIT

          # Validate secrets up front so missing config fails with a clear
          # message instead of an opaque error from notary-submit/openssl.
          for var in AC_API_KEY_ID AC_API_ISSUER_ID AC_API_PRIVATE_KEY_P8; do
            if [ -z "${!var:-}" ]; then
              echo "::error::Secret $var is not set in the 'packaging' environment."
              echo "Required App Store Connect API key secrets for notarization:"
              echo "  AC_API_KEY_ID          — key id shown in App Store Connect (e.g. ABC12DEF34)"
              echo "  AC_API_ISSUER_ID       — issuer id (UUID) for the team's API keys"
              echo "  AC_API_PRIVATE_KEY_P8  — contents of AuthKey_XXXX.p8 (base64-encoded recommended)"
              exit 1
            fi
          done

          # The AC_API_PRIVATE_KEY_P8 secret stores the App Store Connect .p8
          # key base64-encoded (same convention as DEV_ID_CERT_P12). Decode it
          # back to PEM here. Also tolerate a raw .p8 pasted verbatim, and
          # strip CR so a CRLF-mangled paste still parses — passing the secret
          # verbatim makes the API call fail with the opaque "invalidAsn1".
          if printf '%s' "$AC_API_PRIVATE_KEY_P8" | grep -q 'BEGIN PRIVATE KEY'; then
            printf '%s\n' "$AC_API_PRIVATE_KEY_P8" | tr -d '\r' > "$KEY_FILE"
          else
            printf '%s' "$AC_API_PRIVATE_KEY_P8" | tr -d '[:space:]' | base64 --decode > "$KEY_FILE"
          fi
          chmod 600 "$KEY_FILE"

          # Surface a clear message if the materialized key is not a valid
          # PKCS#8 key, instead of an opaque ASN.1 error from rcodesign.
          if ! openssl pkey -in "$KEY_FILE" -noout 2>/dev/null; then
            echo "::error::AC_API_PRIVATE_KEY_P8 did not parse as a PKCS#8 private key after decoding."
            echo "Re-store it as base64 of the .p8 file (e.g. base64 -i AuthKey_XXXX.p8 | pbcopy)."
            exit 1
          fi

          # Build rcodesign's unified API-key JSON from the three secrets.
          rcodesign encode-app-store-connect-api-key \
            -o "$AC_KEY_JSON" \
            "$AC_API_ISSUER_ID" "$AC_API_KEY_ID" "$KEY_FILE"
          chmod 600 "$AC_KEY_JSON"

          # Bundle both signed binaries into a single zip — one notary
          # submission covers both, halving wall-clock time vs. submitting
          # each binary independently.
          mkdir -p "$NOTARIZE_DIR"
          cp "$BIN_DIR/mlxcel" "$NOTARIZE_DIR/"
          cp "$BIN_DIR/mlxcel-server" "$NOTARIZE_DIR/"
          /usr/bin/ditto -c -k --sequesterRsrc "$NOTARIZE_DIR" "$NOTARIZE_ZIP"

          echo "Submitting notarization request..."
          # No --staple: bare Mach-O cannot be stapled; rely on online check.
          rcodesign notary-submit \
            --api-key-path "$AC_KEY_JSON" \
            --wait \
            "$NOTARIZE_ZIP"

          # Gatekeeper assessment on the actual binaries. The ticket may
          # take a moment to propagate after the notary service returns
          # Accepted; treat a transient failure as a warning, not a hard
          # error, so an otherwise-good release isn't blocked.
          for BIN in mlxcel mlxcel-server; do
            if /usr/sbin/spctl --assess --type execute --verbose "$BIN_DIR/$BIN"; then
              echo "spctl assessment passed for $BIN"
            else
              echo "::warning::spctl assessment did not pass yet for $BIN — ticket may still be propagating"
            fi
          done

      - name: Locate mlx.metallib
        run: |
          METALLIB=$(find "$CARGO_TARGET_DIR/aarch64-apple-darwin/release/build/mlxcel-core-"*/out/build/lib -name "mlx.metallib" 2>/dev/null | head -1)
          if [ -z "$METALLIB" ]; then
            echo "::error::mlx.metallib not found in build output"
            exit 1
          fi
          echo "METALLIB_PATH=$METALLIB" >> $GITHUB_ENV
          echo "Found mlx.metallib at: $METALLIB ($(du -h "$METALLIB" | cut -f1))"

      - name: Package binaries
        run: |
          BIN_DIR="$CARGO_TARGET_DIR/aarch64-apple-darwin/release"
          mkdir -p package
          cp "$BIN_DIR/mlxcel" package/
          cp "$BIN_DIR/mlxcel-server" package/
          cp "$METALLIB_PATH" package/mlx.metallib
          ditto -c -k --sequesterRsrc package mlxcel-macos-aarch64.zip

      - name: Generate checksum
        run: shasum -a 256 mlxcel-macos-aarch64.zip > mlxcel-macos-aarch64.zip.sha256

      - name: Upload release artifacts
        if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag != '')
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.event.release.tag_name || github.event.inputs.release_tag }}
          files: |
            mlxcel-macos-aarch64.zip
            mlxcel-macos-aarch64.zip.sha256

      # Always scrub on-disk signing material, even if a prior step failed.
      # The PEM lives in $RUNNER_TEMP between the Prepare-cert and Code-sign
      # steps; on self-hosted runners $RUNNER_TEMP may persist across jobs,
      # so an unencrypted Developer ID private key could otherwise linger
      # on the runner host.
      - name: Cleanup signing material
        if: always()
        run: |
          rm -f \
            "$RUNNER_TEMP/signing.pem" \
            "$RUNNER_TEMP/original.p12" \
            "$RUNNER_TEMP/openssl.err" \
            "$RUNNER_TEMP/AuthKey.p8" \
            "$RUNNER_TEMP/ac-key.json" \
            "$RUNNER_TEMP/notarize.zip" 2>/dev/null || true
          rm -rf "$RUNNER_TEMP/notarize-dir" 2>/dev/null || true

  # ============================================================================
  # Linux ARM64 + CUDA builds (self-hosted GB10 runner)
  # ============================================================================
  build-linux-cuda:
    name: Build Linux aarch64 CUDA
    runs-on: GB10
    environment: packaging
    # See the macOS job for the rationale behind these two guards.
    if: |
      github.repository == 'lablup/mlxcel' && (
        github.event_name == 'release' ||
        github.event.inputs.targets == 'all' ||
        github.event.inputs.targets == 'linux' ||
        github.event.inputs.targets == 'linux-aarch64'
      )
    permissions:
      contents: write

    # One aarch64 fat binary covering the NVIDIA aarch64 targets in a single
    # build: GH200 (Grace Hopper, sm_90a), GB200 (Grace Blackwell, sm_100), and
    # GB10 / DGX Spark (Blackwell, sm_121), cross-compiled on the GB10 runner.
    # 90a is load-bearing for MLX's Hopper quantized kernel gate, and build.rs
    # forwards the list verbatim. The CLI and server (~347 MB each) ship as
    # separate archives, both with the CCCL headers.
    env:
      MLX_CUDA_ARCHITECTURES: "90a;100;121"
      CLI_ASSET: mlxcel-linux-aarch64-cuda13
      SERVER_ASSET: mlxcel-server-linux-aarch64-cuda13

    # Cold build compiles MLX for three CUDA architectures; generous ceiling so
    # a from-scratch build is never killed (the cargo cache makes reruns cheap).
    timeout-minutes: 360

    steps:
      # Self-healing release: build the *source of the target tag* while
      # running the *current* workflow definition. GitHub always executes the
      # release.yml baked into the triggering ref, so a bug in an old tag's
      # workflow (e.g. a broken notarization step) cannot be fixed by
      # re-running that tag. To recover, dispatch this workflow from main
      # (or any branch carrying the fixed release.yml) and pass the old tag
      # as release_tag: the fixed workflow runs, but the old tag's source is
      # what gets built and uploaded.
      #   - release event      -> the published release's tag
      #   - workflow_dispatch  -> the release_tag input, when provided
      #   - otherwise          -> the exact commit that triggered the run
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          # Don't leave GITHUB_TOKEN in .git/config; release jobs only fetch.
          persist-credentials: false
          ref: ${{ github.event.release.tag_name || github.event.inputs.release_tag || github.sha }}

      # Use persistent cache paths for self-hosted runner (outside workspace)
      - name: Setup persistent cache paths (self-hosted)
        run: |
          # Set persistent cargo target directory to enable incremental builds
          # on self-hosted runner (avoids recompiling from scratch every run)
          CARGO_TARGET="$HOME/.cargo-target/mlxcel-cuda-aarch64"
          mkdir -p "$CARGO_TARGET"
          echo "CARGO_TARGET_DIR=$CARGO_TARGET" >> $GITHUB_ENV

          # Prune stale cargo target cache if older than 7 days
          MARKER="$CARGO_TARGET/.last-clean"
          SHOULD_CLEAN=false
          if [ ! -f "$MARKER" ]; then
            SHOULD_CLEAN=true
          elif [ "$(find "$MARKER" -mtime +7 2>/dev/null)" ]; then
            SHOULD_CLEAN=true
          fi
          if [ "$SHOULD_CLEAN" = true ]; then
            echo "Cargo target cache older than 7 days — cleaning"
            rm -rf "$CARGO_TARGET"
            mkdir -p "$CARGO_TARGET"
            date -u +"%Y-%m-%dT%H:%M:%SZ" > "$MARKER"
          else
            AGE_DAYS=$(( ($(date +%s) - $(stat -c %Y "$MARKER")) / 86400 ))
            echo "Cargo target cache age: ${AGE_DAYS}d — keeping"
          fi

      - name: Validate MLX build cache
        run: |
          # MLX_EXPECTED_COMMIT is set at workflow scope (top of this file).
          # Check every _deps directory for a valid .mlx-build-commit marker.
          # If the marker is missing or doesn't match, purge that _deps/ entirely.
          # This ensures stale MLX source/objects never survive across MLX upgrades.
          FOUND=0
          PURGED=0
          for deps_dir in $(find "$CARGO_TARGET_DIR" -path "*/_deps" -type d 2>/dev/null); do
            FOUND=$((FOUND + 1))
            MARKER="$deps_dir/.mlx-build-commit"
            if [ -f "$MARKER" ] && [ "$(cat "$MARKER")" = "$MLX_EXPECTED_COMMIT" ]; then
              echo "Valid cache: $deps_dir"
            else
              echo "Stale cache (marker=$(cat "$MARKER" 2>/dev/null || echo 'missing')): purging $deps_dir"
              rm -rf "$deps_dir"
              PURGED=$((PURGED + 1))
            fi
          done
          # Also clean workspace target/ from any previous actions/cache restore
          for deps_dir in $(find target -path "*/_deps" -type d 2>/dev/null); do
            rm -rf "$deps_dir"
            PURGED=$((PURGED + 1))
          done
          echo "Checked $FOUND cache(s), purged $PURGED"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build release binaries
        run: cargo build --release --features cuda --locked
        # MLX_CUDA_ARCHITECTURES is inherited from the job env above.

      - name: Package binaries
        run: |
          set -euo pipefail
          BIN_DIR="$CARGO_TARGET_DIR/release"

          # Bundle the CCCL (libcu++) headers MLX's runtime NVRTC JIT needs. The
          # compiled-in MLX_CCCL_DIR points at this build machine and is useless
          # on the deployment host, so ship the headers in MLX's native layout:
          # the JIT looks for <exe-dir>/../include/cccl, hence bin/ + include/cccl/.
          # See the x86_64 job for the full rationale.
          CCCL_INC=$(find "$BIN_DIR/build" -type d -path '*/_deps/cccl-src/include' 2>/dev/null | head -1)
          if [ -z "$CCCL_INC" ] || [ ! -d "$CCCL_INC/cuda" ] || [ ! -d "$CCCL_INC/nv" ]; then
            echo "::error::CCCL headers not found under the build tree (expected _deps/cccl-src/include/{cuda,nv})"
            exit 1
          fi
          echo "Bundling CCCL headers from: $CCCL_INC"

          package_one() {
            bin="$1"; asset="$2"
            pkg="package/${asset}"
            rm -rf "$pkg"
            mkdir -p "$pkg/bin" "$pkg/include/cccl"
            cp "$BIN_DIR/${bin}" "$pkg/bin/"
            cp -R "$CCCL_INC/cuda" "$pkg/include/cccl/"
            cp -R "$CCCL_INC/nv" "$pkg/include/cccl/"
            n=$(find "$pkg/include/cccl" -type f | wc -l | tr -d ' ')
            if [ ! -f "$pkg/include/cccl/cuda/std/tuple" ] || [ "$n" -lt 100 ]; then
              echo "::error::CCCL bundle for ${asset} looks incomplete (${n} files)"
              exit 1
            fi
            ( cd package && zip -rq "../${asset}.zip" "${asset}" )
            echo "Packaged ${asset}.zip ($(du -h "${asset}.zip" | cut -f1), CCCL headers: ${n})"
          }

          package_one mlxcel "${CLI_ASSET}"
          package_one mlxcel-server "${SERVER_ASSET}"

      - name: Generate checksums
        run: |
          set -euo pipefail
          for asset in "${CLI_ASSET}" "${SERVER_ASSET}"; do
            sha256sum "${asset}.zip" > "${asset}.zip.sha256"
          done

      - name: Upload release artifacts
        if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag != '')
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.event.release.tag_name || github.event.inputs.release_tag }}
          files: |
            ${{ env.CLI_ASSET }}.zip
            ${{ env.CLI_ASSET }}.zip.sha256
            ${{ env.SERVER_ASSET }}.zip
            ${{ env.SERVER_ASSET }}.zip.sha256

  # ============================================================================
  # Linux x86_64 + CUDA build (self-hosted RTX-class runner)
  # ============================================================================
  build-linux-x86_64-cuda:
    name: Build Linux x86_64 CUDA
    # Self-hosted x86_64 NVIDIA runner. A Linux x64 self-hosted runner is given
    # the self-hosted/Linux/X64 default labels automatically; CUDA is the custom
    # label that marks the NVIDIA-equipped host (lablup-x64-cuda-build1).
    runs-on: [self-hosted, Linux, X64, CUDA]
    environment: packaging
    # See the macOS job for the rationale behind these two guards. The dispatch
    # filter: `linux` builds every Linux arch, `linux-x86_64` isolates this job
    # for bring-up without churning the aarch64 artifacts.
    if: |
      github.repository == 'lablup/mlxcel' && (
        github.event_name == 'release' ||
        github.event.inputs.targets == 'all' ||
        github.event.inputs.targets == 'linux' ||
        github.event.inputs.targets == 'linux-x86_64'
      )
    permissions:
      contents: write

    # One fat binary covering Ampere and later. 90a is load-bearing: MLX gates
    # its Hopper quantized kernel on "90a" being in the list (MLX_CUDA_SM90A_ENABLED),
    # and build.rs forwards MLX_CUDA_ARCHITECTURES verbatim (no auto-suffix). Blackwell
    # (sm_100/sm_120) has no MLX gate, so plain numbers emit SASS+PTX. sm_87 (Jetson)
    # and sm_121 (GB10) are aarch64-only and excluded here. The build runner's own GPU
    # is an RTX 5060 (sm_120), so the smoke test below runs on native SASS.
    env:
      MLX_CUDA_ARCHITECTURES: "80;86;89;90a;100;120"
      # The CLI and server binaries are ~347 MB each, so ship them as separate
      # archives; a consumer pulls only what it needs. Both carry the CCCL headers.
      CLI_ASSET: mlxcel-linux-x86_64-cuda13
      SERVER_ASSET: mlxcel-server-linux-x86_64-cuda13

    # A cold build compiles MLX for six CUDA architectures (CUTLASS-heavy
    # quantized kernels per arch); the persistent cargo cache makes later runs
    # far cheaper. Generous ceiling so a from-scratch build is not killed (a
    # cold 6-arch build was observed at ~3h).
    timeout-minutes: 480

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          persist-credentials: false
          ref: ${{ github.event.release.tag_name || github.event.inputs.release_tag || github.sha }}

      - name: Setup persistent cache paths (self-hosted)
        run: |
          CARGO_TARGET="$HOME/.cargo-target/mlxcel-cuda-x86_64"
          mkdir -p "$CARGO_TARGET"
          echo "CARGO_TARGET_DIR=$CARGO_TARGET" >> $GITHUB_ENV

          # Prune stale cargo target cache if older than 7 days.
          MARKER="$CARGO_TARGET/.last-clean"
          SHOULD_CLEAN=false
          if [ ! -f "$MARKER" ]; then
            SHOULD_CLEAN=true
          elif [ "$(find "$MARKER" -mtime +7 2>/dev/null)" ]; then
            SHOULD_CLEAN=true
          fi
          if [ "$SHOULD_CLEAN" = true ]; then
            echo "Cargo target cache older than 7 days: cleaning"
            rm -rf "$CARGO_TARGET"
            mkdir -p "$CARGO_TARGET"
            date -u +"%Y-%m-%dT%H:%M:%SZ" > "$MARKER"
          else
            AGE_DAYS=$(( ($(date +%s) - $(stat -c %Y "$MARKER")) / 86400 ))
            echo "Cargo target cache age: ${AGE_DAYS}d (keeping)"
          fi

      - name: Validate MLX build cache
        run: |
          # MLX_EXPECTED_COMMIT is set at workflow scope (top of this file).
          # Check every _deps directory for a valid .mlx-build-commit marker.
          # If the marker is missing or doesn't match, purge that _deps/ entirely.
          FOUND=0
          PURGED=0
          for deps_dir in $(find "$CARGO_TARGET_DIR" -path "*/_deps" -type d 2>/dev/null); do
            FOUND=$((FOUND + 1))
            MARKER="$deps_dir/.mlx-build-commit"
            if [ -f "$MARKER" ] && [ "$(cat "$MARKER")" = "$MLX_EXPECTED_COMMIT" ]; then
              echo "Valid cache: $deps_dir"
            else
              echo "Stale cache (marker=$(cat "$MARKER" 2>/dev/null || echo 'missing')): purging $deps_dir"
              rm -rf "$deps_dir"
              PURGED=$((PURGED + 1))
            fi
          done
          for deps_dir in $(find target -path "*/_deps" -type d 2>/dev/null); do
            rm -rf "$deps_dir"
            PURGED=$((PURGED + 1))
          done
          echo "Checked $FOUND cache(s), purged $PURGED"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build release binaries
        run: cargo build --release --features cuda --locked
        # MLX_CUDA_ARCHITECTURES is inherited from the job env above.
        env:
          # Redistributable asset: pin the C++ bridge and Rust code to the
          # portable x86-64-v3 baseline (AVX2, ~2013+) instead of inheriting
          # this build host's native ISA. build.rs defaults the bridge to
          # -march=native, which on a newer runner could bake in AVX-512 and
          # SIGILL on older customer CPUs. Set MLXCEL_CXX_MARCH=none to omit.
          MLXCEL_CXX_MARCH: x86-64-v3
          RUSTFLAGS: "-C target-cpu=x86-64-v3"

      - name: Smoke test (10-token generate on GPU)
        run: |
          set -euo pipefail
          BIN_DIR="$CARGO_TARGET_DIR/release"
          # Make the CUDA runtime/math libs we linked resolvable at run time.
          export LD_LIBRARY_PATH="${CUDA_HOME:-/usr/local/cuda}/lib64:${LD_LIBRARY_PATH:-}"
          # Keep the model cache inside the job temp dir so it does not accumulate
          # on the persistent self-hosted runner.
          export MLXCEL_CACHE_DIR="$RUNNER_TEMP/mlxcel-smoke"
          MODEL_ID="mlx-community/Qwen3-0.6B-4bit"
          MODEL_DIR="$MLXCEL_CACHE_DIR/models/mlx-community/Qwen3-0.6B-4bit"
          echo "=== GPU ==="
          nvidia-smi || true
          echo "=== download $MODEL_ID ==="
          "$BIN_DIR/mlxcel" download "$MODEL_ID"
          echo "=== generate (10 tokens) ==="
          "$BIN_DIR/mlxcel" generate -m "$MODEL_DIR" -p "Hello, world." -n 10

      - name: Clean up smoke-test model cache
        if: always()
        run: rm -rf "$RUNNER_TEMP/mlxcel-smoke" 2>/dev/null || true

      - name: Package binaries
        run: |
          set -euo pipefail
          BIN_DIR="$CARGO_TARGET_DIR/release"

          # MLX's CUDA backend NVRTC-JITs gather/indexing kernels at runtime;
          # those include <cuda/std/tuple>, so the CCCL (libcu++) headers must be
          # present on the deployment host. The compiled-in MLX_CCCL_DIR points at
          # this build machine's path and is useless elsewhere, so bundle the
          # headers in MLX's native runtime layout: the JIT looks for
          # <exe-dir>/../include/cccl, hence bin/ + include/cccl/. Only cuda/ and
          # nv/ are needed (MLX installs exactly those), ~8.8 MB. Host CUDA runtime
          # headers (cuda_runtime.h etc.) still come from the node's CUDA_HOME.
          CCCL_INC=$(find "$BIN_DIR/build" -type d -path '*/_deps/cccl-src/include' 2>/dev/null | head -1)
          if [ -z "$CCCL_INC" ] || [ ! -d "$CCCL_INC/cuda" ] || [ ! -d "$CCCL_INC/nv" ]; then
            echo "::error::CCCL headers not found under the build tree (expected _deps/cccl-src/include/{cuda,nv})"
            exit 1
          fi
          echo "Bundling CCCL headers from: $CCCL_INC"

          # Package one binary as its own self-contained archive: bin/<binary>
          # plus the CCCL headers in MLX's native include/cccl/ layout.
          package_one() {
            bin="$1"; asset="$2"
            pkg="package/${asset}"
            rm -rf "$pkg"
            mkdir -p "$pkg/bin" "$pkg/include/cccl"
            cp "$BIN_DIR/${bin}" "$pkg/bin/"
            cp -R "$CCCL_INC/cuda" "$pkg/include/cccl/"
            cp -R "$CCCL_INC/nv" "$pkg/include/cccl/"
            n=$(find "$pkg/include/cccl" -type f | wc -l | tr -d ' ')
            if [ ! -f "$pkg/include/cccl/cuda/std/tuple" ] || [ "$n" -lt 100 ]; then
              echo "::error::CCCL bundle for ${asset} looks incomplete (${n} files)"
              exit 1
            fi
            ( cd package && zip -rq "../${asset}.zip" "${asset}" )
            echo "Packaged ${asset}.zip ($(du -h "${asset}.zip" | cut -f1), CCCL headers: ${n})"
          }

          package_one mlxcel "${CLI_ASSET}"
          package_one mlxcel-server "${SERVER_ASSET}"

      - name: Generate checksums
        run: |
          set -euo pipefail
          for asset in "${CLI_ASSET}" "${SERVER_ASSET}"; do
            sha256sum "${asset}.zip" > "${asset}.zip.sha256"
          done

      - name: Upload release artifacts
        if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag != '')
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.event.release.tag_name || github.event.inputs.release_tag }}
          files: |
            ${{ env.CLI_ASSET }}.zip
            ${{ env.CLI_ASSET }}.zip.sha256
            ${{ env.SERVER_ASSET }}.zip
            ${{ env.SERVER_ASSET }}.zip.sha256

  # ============================================================================
  # Microsoft Teams release notification (Power Automate Workflows webhook)
  # ============================================================================
  notify-teams:
    name: Notify Teams on release
    needs: [build-macos, build-linux-cuda, build-linux-x86_64-cuda]
    if: github.repository == 'lablup/mlxcel' && github.event_name == 'release'
    runs-on: ubuntu-latest
    permissions: {}

    steps:
      - name: Build Adaptive Card payload
        env:
          TAG:  ${{ github.event.release.tag_name }}
          NAME: ${{ github.event.release.name }}
          URL:  ${{ github.event.release.html_url }}
          BODY: ${{ github.event.release.body }}
          REPO: ${{ github.repository }}
        run: |
          TRIMMED=$(printf '%s' "$BODY" | head -c 2000)
          jq -n \
            --arg tag "$TAG" --arg name "$NAME" \
            --arg url "$URL" --arg body "$TRIMMED" --arg repo "$REPO" '
          {
            type: "message",
            attachments: [{
              contentType: "application/vnd.microsoft.card.adaptive",
              content: {
                "$schema": "http://adaptivecards.io/schemas/adaptive-card.json",
                type: "AdaptiveCard",
                version: "1.5",
                body: [
                  { type: "TextBlock", size: "Large", weight: "Bolder",
                    text: ("🚀 " + $repo + " " + $tag + " released") },
                  { type: "TextBlock", text: $name, wrap: true, isSubtle: true },
                  { type: "TextBlock", text: $body, wrap: true }
                ],
                actions: [
                  { type: "Action.OpenUrl", title: "View release", url: $url }
                ]
              }
            }]
          }' > card.json

      - name: POST to Teams workflow
        if: env.WEBHOOK_URL != ''
        env:
          WEBHOOK_URL: ${{ secrets.TEAMS_RELEASE_NOTIFICATION_WORKFLOW_URL }}
        run: |
          curl -sSf -X POST \
            -H "Content-Type: application/json" \
            --data-binary @card.json \
            "$WEBHOOK_URL"

  # ============================================================================
  # Promote pre-release to full release after all jobs succeed
  # ============================================================================
  promote-release:
    name: Promote to full release
    needs: [build-macos, build-linux-cuda, build-linux-x86_64-cuda]
    if: always() && github.repository == 'lablup/mlxcel' && github.event_name == 'release' && github.event.release.prerelease && needs.build-macos.result == 'success' && needs.build-linux-cuda.result == 'success' && needs.build-linux-x86_64-cuda.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Mark release as non-prerelease
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit "${{ github.event.release.tag_name }}" \
            --repo "${{ github.repository }}" \
            --prerelease=false
