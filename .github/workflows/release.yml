name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag to upload artifacts to (e.g. v0.1.0)'
        required: false

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    environment: packaging

    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS ARM64 (Apple Silicon - primary target)
          - target: aarch64-apple-darwin
            os: macos-14
            asset_name: mlxcel-macos-aarch64
            archive_ext: ".zip"

    env:
      MACOSX_DEPLOYMENT_TARGET: "14.0"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ matrix.target }}-${{ hashFiles('**/Cargo.toml') }}
            ${{ runner.os }}-cargo-${{ matrix.target }}-

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binaries
        run: cargo build --release --target ${{ matrix.target }} --locked
        env:
          RUSTFLAGS: "-C target-cpu=apple-m1"

      # macOS code signing
      - name: Import Distribution certificate
        if: runner.os == 'macOS'
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.DEV_ID_CERT_P12 }}
          p12-password: ${{ secrets.DEV_ID_CERT_PASSWORD }}

      - name: Code sign macOS binaries
        if: runner.os == 'macOS'
        run: |
          BIN_DIR="target/${{ matrix.target }}/release"
          for BIN in mlxcel mlxcel-server; do
            codesign --force --timestamp --options runtime \
                     --sign "Distribution" "$BIN_DIR/$BIN"
          done

      # Package binaries
      - name: Package macOS binaries (zip)
        if: runner.os == 'macOS'
        run: |
          BIN_DIR="target/${{ matrix.target }}/release"
          mkdir -p package
          cp "$BIN_DIR/mlxcel" package/
          cp "$BIN_DIR/mlxcel-server" package/
          ditto -c -k --sequesterRsrc package "${{ matrix.asset_name }}.zip"

      # Generate checksum
      - name: Generate checksum (macOS)
        if: runner.os == 'macOS'
        run: |
          FILE="${{ matrix.asset_name }}${{ matrix.archive_ext }}"
          shasum -a 256 "$FILE" > "$FILE.sha256"

      # Upload release artifacts
      - name: Upload release artifacts
        if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name || github.event.inputs.release_tag }}
          files: |
            ${{ matrix.asset_name }}${{ matrix.archive_ext }}
            ${{ matrix.asset_name }}${{ matrix.archive_ext }}.sha256
