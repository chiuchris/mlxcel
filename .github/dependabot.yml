# Dependabot configuration for automated dependency updates.
# Docs: https://docs.github.com/en/code-security/dependabot/dependabot-version-updates

version: 2
updates:
  # Cargo (Rust) dependencies — unified workspace lock (mlxcel, mlxcel-core, mlxcel-surgery).
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Seoul"
    open-pull-requests-limit: 10
    groups:
      minor-and-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    labels:
      - "type:dependency"
    commit-message:
      prefix: "deps"
      include: "scope"

  # GitHub Actions dependencies.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Seoul"
    open-pull-requests-limit: 5
    labels:
      - "type:dependency"
      - "type:chore"
    commit-message:
      prefix: "ci"
      include: "scope"
