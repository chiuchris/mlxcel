[package]
name = "mlxcel"
version = "0.0.3"
edition = "2024"
description = "High-performance LLM/VLM/VLA inference on Apple Silicon and CUDA GPUs"
repository = "https://github.com/lablup/mlxcel"
license = "MIT"
keywords = ["mlx", "llm", "vlm", "inference"]
categories = ["science", "command-line-utilities"]

[[bin]]
name = "mlxcel"
path = "src/main.rs"

[[bin]]
name = "mlxcel-server"
path = "src/bin/mlx_server.rs"

[features]
default = []
metal = ["mlxcel-core/metal"]
accelerate = ["mlxcel-core/accelerate"]
cuda = ["mlxcel-core/cuda"]

[dependencies]
# MLX - mlxcel-core (direct C++ bindings via cxx)
mlxcel-core = { path = "src/lib/mlxcel-core", default-features = false }

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# Tensors & Models
safetensors = "0.7.0"
tokenizers = "0.22.2"
sentencepiece = "0.13"

# Error Handling
anyhow = "1.0.100"
thiserror = "2.0.11"

# CLI
clap = { version = "4.5.31", features = ["derive", "env"] }

# Image processing (for VLM)
image = { version = "0.25", default-features = false, features = ["png", "jpeg", "webp"] }

# Base64 (for VLM image data URIs in server API)
base64 = "0.22"

# Utils
glob = "0.3.2"
path-clean = "1.0.1"
minijinja = { version = "2.5", features = ["loop_controls"] }

# HTTP Server
tokio = { version = "1.35", features = ["full"] }
axum = { version = "0.7", features = ["json", "macros"] }
tokio-stream = "0.1"
futures = "0.3"
uuid = { version = "1.6", features = ["v4"] }
chrono = "0.4"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
tower-http = { version = "0.5", features = ["cors", "trace"] }
tower = { version = "0.4", features = ["util"] }
hyper = { version = "1.1", features = ["server"] }
hyper-util = { version = "0.1", features = ["tokio", "server-auto"] }
async-stream = "0.3"
fancy-regex = "0.17.0"

[profile.release]
# Remove debug info but keep symbol table for Tauri updater compatibility
# "debuginfo" strips debug info only, "symbols" would break the updater plugin
strip = "debuginfo"

# Link-Time Optimization for smaller binary and better optimization
# "thin" provides good balance between build time and optimization
lto = "thin"

# Abort on panic instead of unwinding
# Reduces binary size, but lose stack traces on panic
panic = "abort"

# Single codegen unit for maximum optimization
# Trade-off: slower compilation
codegen-units = 1

# Maximum optimization level (explicit for clarity)
opt-level = 3

[lints.clippy]
upper_case_acronyms = "allow"
too_many_arguments = "allow"
type_complexity = "allow"
large_enum_variant = "allow"
should_implement_trait = "allow"
