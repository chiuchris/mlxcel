# SLERP-based model interpolation example (A9).
#
# Blends every per-layer tensor of the base model with the
# corresponding tensors from `model_a.safetensors` and
# `model_b.safetensors`, using a spherical-linear (SLERP) blend at
# t=0.3 (closer to model_a). When the two donor tensors are
# (nearly) parallel SLERP degenerates numerically — the
# implementation transparently falls back to LERP on those
# tensors with epsilon = 1e-6 (see
# `src/lib/mlxcel-surgery/src/ops/interpolate.rs` for details).
#
# NOTE: the donor files referenced below do not exist in the
# workspace. This file is for documentation purposes; copy and
# adjust the paths to your two donor checkpoints.

version: 1
operations:
  - op: interpolate
    pattern: "model.layers.*.*"
    source_a: "./donors/model_a.safetensors"
    source_b: "./donors/model_b.safetensors"
    ratio: 0.3
    method: slerp
